<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updated Portfolio</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Custom Styles -->
    <style>
        .frosted {
            backdrop-filter: blur(10px);
            background-color: rgba(240, 240, 240, 0.6);
            border: 1px solid rgba(200, 200, 200, 0.4);
        }

        .navbar {
            transition: all 0.3s ease;
            margin: 0 !important;
            padding: 0 !important;
        }

        .contact-btn {
            width: 200px;
            padding: 12px 0;
            font-size: 16px;
        }

        .card-container {
            max-width: 768px;
            margin: 0 auto;
        }
    </style>
</head>

<body class="bg-white text-gray-800 h-screen flex items-center justify-center">

    <!-- Navbar -->
    <header class="bg-white frosted shadow-md rounded-2xl navbar">
        <div class="max-w-3xl px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">MyPortfolio</h1>
            <button id="menu-btn" class="md:hidden text-gray-800 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <nav id="menu" class="hidden md:flex space-x-6 items-center">
                <a href="#" class="text-gray-800 hover:text-green-600">Home</a>
                <a href="#" class="text-gray-800 hover:text-green-600">About</a>
                <a href="#" class="text-gray-800 hover:text-green-600">Services</a>
                <a href="#contact" class="bg-green-600 text-white px-4 py-2 rounded-full hover:bg-green-700">Contact
                    Us</a>
            </nav>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="md:hidden hidden px-4 pb-4 space-y-2">
            <a href="#" class="block text-gray-800 hover:text-green-600">Home</a>
            <a href="#" class="block text-gray-800 hover:text-green-600">About</a>
            <a href="#" class="block text-gray-800 hover:text-green-600">Services</a>
            <a href="#contact" class="block bg-green-600 text-white px-4 py-2 rounded-full hover:bg-green-700">Contact
                Us</a>
        </div>
    </header>

    <!-- The rest of your content is hidden for centering demo.
                                                                                                                                                                                                                                                                                                   You can move this outside the body.flex container if needed. -->

    <!-- Mobile Menu Script -->
    <script>
        const menuBtn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");

        menuBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("hidden");
        });
    </script>
</body>

</html>
